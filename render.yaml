services:
  - type: web
    name: cetaphil-chat-agent
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn server:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: cetaphil-db
          property: connectionString
      - key: OLLAMA_HOST
        value: "http://YOUR_NGROK_URL_HERE:11434" # Replace this with your actual ngrok or cloud LLM URL

databases:
  - name: cetaphil-db
    databaseName: ai
    user: ai
    plan: starter
